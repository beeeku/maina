name: Daily Audit

on:
  schedule:
    - cron: '0 6 * * *' # 06:00 UTC daily
  workflow_dispatch: # manual trigger

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Run tests
        id: tests
        continue-on-error: true
        run: |
          bun run test 2>&1 | tee test-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Run verify
        id: verify
        continue-on-error: true
        run: |
          bun packages/cli/dist/index.js verify --all --json 2>&1 | tee verify-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Run slop check
        id: slop
        continue-on-error: true
        run: |
          bun packages/cli/dist/index.js slop --json 2>&1 | tee slop-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Run stats
        id: stats
        continue-on-error: true
        run: |
          bun packages/cli/dist/index.js stats 2>&1 | tee stats-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Determine if findings exist
        id: findings
        run: |
          has_findings=false
          if [ "${{ steps.tests.outcome }}" = "failure" ]; then has_findings=true; fi
          if [ "${{ steps.verify.outcome }}" = "failure" ]; then has_findings=true; fi
          if [ "${{ steps.slop.outcome }}" = "failure" ]; then has_findings=true; fi
          if [ "${{ steps.stats.outcome }}" = "failure" ]; then has_findings=true; fi
          echo "has_findings=$has_findings" >> "$GITHUB_OUTPUT"

      - name: Ensure labels exist
        if: steps.findings.outputs.has_findings == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create audit --color "D93F0B" --description "Daily audit findings" --force
          gh label create copilot --color "1D76DB" --description "Triggers GitHub Copilot coding agent" --force

      - name: Create issue with findings
        if: steps.findings.outputs.has_findings == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)

          VERIFY_OUTPUT=$(cat verify-output.txt 2>/dev/null || echo "No output")
          SLOP_OUTPUT=$(cat slop-output.txt 2>/dev/null || echo "No output")
          STATS_OUTPUT=$(cat stats-output.txt 2>/dev/null || echo "No output")
          TEST_OUTPUT=$(tail -50 test-output.txt 2>/dev/null || echo "No output")

          TEST_STATUS="${{ steps.tests.outcome }}"
          VERIFY_STATUS="${{ steps.verify.outcome }}"
          SLOP_STATUS="${{ steps.slop.outcome }}"
          STATS_STATUS="${{ steps.stats.outcome }}"

          gh issue create \
            --title "audit: daily findings — $DATE" \
            --label "audit,copilot" \
            --body "$(cat <<EOF
          ## Daily Audit — $DATE

          Automated audit found issues that need attention.

          ### Status

          | Check | Result |
          |-------|--------|
          | Tests | $TEST_STATUS |
          | Verify | $VERIFY_STATUS |
          | Slop | $SLOP_STATUS |
          | Stats | $STATS_STATUS |

          ### Verify Output

          \`\`\`
          $VERIFY_OUTPUT
          \`\`\`

          ### Slop Output

          \`\`\`
          $SLOP_OUTPUT
          \`\`\`

          ### Stats Output

          \`\`\`
          $STATS_OUTPUT
          \`\`\`

          ### Test Output (last 50 lines)

          \`\`\`
          $TEST_OUTPUT
          \`\`\`

          ### What to fix

          - If **tests** failed: check the test output above, fix failing tests
          - If **verify** failed: address lint, type, or security findings
          - If **slop** failed: remove AI-generated filler phrases and boilerplate
          - If **stats** failed: investigate the stats collection error

          ---
          *Generated by [daily-audit.yml](https://github.com/${{ github.repository }}/actions/workflows/daily-audit.yml)*
          EOF
          )"
